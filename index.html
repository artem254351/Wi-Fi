<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ВЫ ЗАРИКРОЛЛЕНЫ🤣</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 960px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .video-wrapper video {
            width: 100%;
            aspect-ratio: 16 / 9;
            display: block;
        }

        .title {
            text-align: center;
            margin-top: 24px;
            font-size: 20px;
            font-weight: 600;
            line-height: 1.3;
        }

        .subtitle {
            text-align: center;
            margin-top: 8px;
            font-size: 14px;
            color: #888;
            line-height: 1.4;
        }

        .hint {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrapper">
            <video 
                src="https://runtime.video.cloud.yandex.net/player/video/vplvpleiai7byd327p4t?autoplay=1&mute=0"
                controls
                playsinline>
            </video>
        </div>
        <h1 class="title">ВЫ ЗАРИКРОЛЛЕНЫ🤣</h1>
        <p class="subtitle">как вы додумались🤣😂🤣😂🤣😂</p>
        <p class="hint">пхахахпахпхпаххахапхапхах</p>
    </div>
</body>
</html>
